# ============================================================
# FairPlay Auctions — Docker Compose
# ============================================================
# Usage:
#   docker-compose up --build        (first run / rebuild)
#   docker-compose up -d             (detached / background)
#   docker-compose down              (stop all)
#   docker-compose logs -f backend   (tail backend logs)
# ============================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fairplay-db
    environment:
      POSTGRES_DB: fairplay_auction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 301204
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (for BullMQ job queues) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fairplay-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API (Node.js + Express + Socket.io) ──────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fairplay-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_NAME: fairplay_auction
      DB_USER: postgres
      DB_PASSWORD: 301204
      DB_HOST: postgres
      JWT_SECRET: supersecretjwtkey_replace_in_prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (React + Vite → Nginx) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fairplay-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
